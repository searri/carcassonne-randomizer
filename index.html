<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carcassonne Picker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        .icon-container img {
            height: 60px;
            width: 60px;
            object-fit: contain;
        }
    </style>
</head>

<body
    class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-white min-h-screen p-4 flex flex-col items-center transition-colors duration-300">

    <header class="w-full max-w-5xl flex flex-col md:flex-row justify-between items-center my-6 gap-4">
        <div class="text-center md:text-left">
            <h1 class="text-2xl md:text-3xl font-bold text-yellow-600 dark:text-yellow-500 uppercase tracking-widest">
                Carcassonne Picker</h1>
            <p id="timeEstimate"
                class="text-sm font-semibold bg-yellow-100 dark:bg-yellow-900/30 text-yellow-700 dark:text-yellow-400 px-3 py-1 rounded-full inline-block mt-2">
                Est. Time: 55m
            </p>
        </div>

        <button onclick="toggleTheme()"
            class="p-2 rounded-lg bg-slate-200 dark:bg-slate-800 hover:ring-2 ring-yellow-500 transition-all">
            <span id="themeIcon" class="text-xl">🌙</span>
        </button>
    </header>

    <div
        class="bg-white dark:bg-slate-800 p-6 rounded-xl shadow-xl w-full max-w-2xl mb-8 flex flex-col items-center justify-center gap-6 border border-slate-200 dark:border-slate-700 md:flex-row md:justify-between md:py-4">
        <div class="flex items-center gap-3">
            <label class="text-sm font-medium">Add:</label>
            <input type="number" id="randomCount" value="2" min="1"
                class="bg-slate-100 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded px-2 py-2 w-20 text-center focus:ring-2 focus:ring-yellow-500 outline-none text-lg md:text-base md:w-16">
            <span class="text-sm text-slate-500 dark:text-slate-400">expansions</span>
        </div>
        <button onclick="addMultiple()"
            class="w-full md:w-auto bg-yellow-600 hover:bg-yellow-500 active:scale-95 text-white font-bold py-3 px-10 rounded-lg transition-all shadow-lg uppercase tracking-wide">
            Randomize +
        </button>
    </div>

    <div id="displayGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 w-full max-w-5xl"></div>

    <script>
        let allData = [];
        let activeExpansions = [];
        const BASE_TIME = 55;

        // Theme Toggle
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            const isDark = html.classList.toggle('dark');
            icon.innerText = isDark ? '🌙' : '☀️';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.remove('dark');
            document.getElementById('themeIcon').innerText = '☀️';
        }

        fetch('expansions.json')
            .then(res => res.json())
            .then(data => {
                allData = data;
                if (allData.length >= 3) {
                    activeExpansions = [allData[0], allData[1], allData[2]];
                } else {
                    activeExpansions = [...allData];
                }
                render();
            });

        function updateTime() {
            // Calculate total: Base + sum of expansion 'time' fields
            const totalMinutes = activeExpansions.reduce((sum, item) => sum + (item.time || 0), BASE_TIME);
            const hours = Math.floor(totalMinutes / 60);
            const mins = totalMinutes % 60;

            const timeString = hours > 0 ? `${hours}h ${mins}m` : `${mins}m`;
            document.getElementById('timeEstimate').innerText = `Est. Play Time: ${timeString}`;
        }

        function render() {
            const grid = document.getElementById('displayGrid');
            updateTime(); // Update clock whenever we render

            if (activeExpansions.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-10 text-slate-500 italic">No expansions selected.</div>`;
                return;
            }

            grid.innerHTML = activeExpansions.map((item, index) => `
                <div class="bg-white dark:bg-slate-800 border-t-4 border-yellow-600 p-6 rounded-xl flex flex-col items-center text-center shadow-lg transition-all duration-300">
                    <div class="icon-container mb-4 bg-slate-100 dark:bg-slate-700 p-3 rounded-full border border-slate-200 dark:border-slate-600">
                        <img src="${item.icon}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/60?text=?'">
                    </div>
                    <h3 class="text-lg font-bold mb-1 h-12 flex items-center justify-center line-clamp-2">${item.name}</h3>
                    <p class="text-xs text-slate-400 mb-4">+${item.time || 0} mins</p>
                    <div class="flex gap-2 w-full">
                        <button onclick="replaceOne(${index})" class="flex-1 bg-slate-200 dark:bg-slate-700 hover:bg-blue-600 hover:text-white py-2 rounded text-xs font-semibold transition-colors">Replace</button>
                        <button onclick="removeOne(${index})" class="flex-1 bg-slate-200 dark:bg-slate-700 hover:bg-red-600 hover:text-white py-2 rounded text-xs font-semibold transition-colors">Remove</button>
                    </div>
                </div>
            `).join('');
        }

        // Logic functions
        function getAvailablePool() {
            const currentNames = activeExpansions.map(e => e.name);
            return allData.filter(item => !currentNames.includes(item.name));
        }

        function addMultiple() {
            const count = parseInt(document.getElementById('randomCount').value);
            for (let i = 0; i < count; i++) {
                const pool = getAvailablePool();
                if (pool.length === 0) break;
                activeExpansions.push(pool[Math.floor(Math.random() * pool.length)]);
            }
            render();
        }

        function replaceOne(index) {
            const pool = getAvailablePool();
            if (pool.length === 0) return;
            activeExpansions[index] = pool[Math.floor(Math.random() * pool.length)];
            render();
        }

        function removeOne(index) {
            activeExpansions.splice(index, 1);
            render();
        }
    </script>
</body>

</html>
